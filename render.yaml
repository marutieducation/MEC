services:
  # Backend Service
  - type: web
    name: mec-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Set this in Render Dashboard
      - key: JWT_SECRET
        sync: false # Set this in Render Dashboard
      - key: ALLOWED_ORIGINS
        sync: false # Set this in Render Dashboard (Frontend URL)
      - key: ENABLE_DEMO_SEEDING
        value: "false"
      - key: SEED_ROUTE_SECRET
        sync: false # Set this in Render Dashboard
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: JWT_EXPIRE
        value: "30d"
      - key: PORT
        value: "10000"

  # Frontend Service (Next.js)
  - type: web
    name: mec-frontend
    runtime: node
    region: singapore
    plan: free
    rootDir: uafms
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false # IMPORTANT: Set to https://your-backend.onrender.com/api
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false # IMPORTANT: Set to https://your-backend.onrender.com
